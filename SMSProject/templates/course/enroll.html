{% extends 'main.html' %}
{% block content %}
<h1>Enroll Student in {{ course.name }}</h1>
<form method="post">
{% csrf_token %}
{{ form.as_p }}
<button type="submit" class="btn btn-success">Enroll</button>
<a href="{% url 'course_detail' course.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
