{% extends 'main.html' %}
{% block title %}Student Registration{% endblock %}
{% block content %}
    <h1>Student Registration page</h1>
    <form method="post">
        {% csrf_token %}
        Name:<input type="text" id="name" name="sname"><br>
        Mob:<input type="tel" id="mob" name="mob"><br>
        Email:<input type="email" id="email" name="email"><br>
        USN:<input type="text" id="usn" name="usn"><br>
        college:<input type="text" id="college" name="college"><br>
        degree:<input type="text" id="degree" name="degree"><br>
        Branch:<input type="text" id="branch" name="branch"><br>
        sem:<input type="number" id="sem" name="sem"><br>
        <input type="submit" value="Register">

    </form>
{% endblock %}
